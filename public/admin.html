<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VinBriefcase Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5eeea; color: #2a1010; padding: 20px; }
    h1 { color: #5c1a1a; margin-bottom: 4px; font-size: 22px; }
    .subtitle { color: #8a5a50; font-size: 13px; margin-bottom: 8px; line-height: 1.6; }
    .howto {
      background: #fff8e1; border: 1px solid #f0c040; border-radius: 10px;
      padding: 14px 18px; margin-bottom: 20px; font-size: 13px; line-height: 1.8;
    }
    .howto strong { color: #5c1a1a; }
    #progress {
      position: sticky; top: 0; background: #3a0f0f; color: #fff;
      padding: 10px 16px; border-radius: 10px; margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; z-index: 10;
    }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e8d0c8;
      background: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
      font-family: inherit; color: #5a3030;
    }
    .filter-btn.active { background: #5c1a1a; color: #fff; border-color: #5c1a1a; }
    .wine-row {
      background: #fff; border: 1px solid #e8d0c8; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap;
    }
    .wine-row.done { border-color: #a5d6a7; background: #f1f8f1; }
    .img-preview {
      width: 40px; height: 88px; object-fit: contain;
      border-radius: 4px; background: #f5eeea; flex-shrink: 0;
    }
    .wine-info { flex: 1; min-width: 180px; }
    .wine-name { font-weight: 700; font-size: 14px; }
    .wine-producer { font-size: 12px; color: #8a5a50; margin-top: 2px; }
    .wine-meta { font-size: 11px; color: #c8922a; font-weight: 600; margin-top: 2px; }
    .current-id { font-size: 12px; margin-top: 5px; }
    .current-id a { color: #5c1a1a; text-decoration: none; }
    .current-id a:hover { text-decoration: underline; }
    .actions { display: flex; flex-direction: column; gap: 6px; min-width: 260px; flex: 2; }
    .search-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: #5c1a1a; color: #fff;
      border-radius: 8px; font-size: 12px; font-weight: 700;
      text-decoration: none; cursor: pointer; border: none;
      font-family: inherit;
    }
    .search-link:hover { background: #7a2828; }
    .input-row { display: flex; gap: 6px; }
    .id-input {
      flex: 1; padding: 8px 10px; border: 1.5px solid #e8d0c8;
      border-radius: 8px; font-size: 13px; font-family: inherit;
      background: #fdfaf8;
    }
    .id-input:focus { outline: none; border-color: #5c1a1a; }
    .btn-save {
      padding: 8px 16px; background: #2e7d32; color: #fff;
      border: none; border-radius: 8px; font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: inherit;
      white-space: nowrap;
    }
    .btn-save:hover { background: #1b5e20; }
    .btn-save:disabled { opacity: 0.5; cursor: wait; }
    .status { font-size: 12px; margin-top: 2px; min-height: 18px; }
    .status.ok { color: #2e7d32; font-weight: 700; }
    .status.err { color: #c0392b; }
    .badge-done {
      display: inline-block; background: #2e7d32; color: #fff;
      border-radius: 20px; padding: 1px 8px; font-size: 10px;
      font-weight: 700; margin-left: 6px;
    }
    #loading { text-align: center; padding: 40px; color: #8a5a50; font-size: 14px; }
    .search-hint { font-size: 11px; color: #8a5a50; margin-top: 3px; }
  </style>
</head>
<body>

<h1>🍷 VinBriefcase Admin</h1>

<div class="howto">
  <strong>Slik bruker du admin-siden:</strong><br>
  1. Klikk <strong>«Søk på Vinmonopolet»</strong> — siden åpnes i ny fane<br>
  2. Finn riktig vin og kopier varenummeret fra URL-en:<br>
  &nbsp;&nbsp;&nbsp;<code>vinmonopolet.no/p/<strong>89501</strong></code> → varenummer er <strong>89501</strong><br>
  3. Lim inn varenummeret i feltet og klikk <strong>«Lagre»</strong>
</div>

<div id="progress">
  <span id="prog-text">Laster...</span>
  <span id="prog-count"></span>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all', this)">Alle</button>
  <button class="filter-btn" onclick="setFilter('undone', this)">Ikke oppdatert</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Oppdatert ✅</button>
</div>

<div id="loading">Laster inn viner...</div>
<div id="wine-list"></div>

<script>
const BASE = window.location.origin;
let allWines = [];
let updated = new Set();
let currentFilter = 'all';

async function load() {
  try {
    const r = await fetch(BASE + '/api/admin-wines');
    allWines = await r.json();
    render();
  } catch(e) {
    document.getElementById('loading').textContent = 'Feil: ' + e.message;
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function updateProgress() {
  document.getElementById('prog-text').textContent =
    `${updated.size} av ${allWines.length} oppdatert`;
}

function render() {
  document.getElementById('loading').style.display = 'none';
  let wines = allWines;
  if (currentFilter === 'undone') wines = allWines.filter(w => !updated.has(w.id));
  if (currentFilter === 'done')   wines = allWines.filter(w =>  updated.has(w.id));
  document.getElementById('prog-count').textContent = `Viser ${wines.length}`;
  updateProgress();

  const list = document.getElementById('wine-list');
  list.innerHTML = '';

  wines.forEach(wine => {
    const isDone = updated.has(wine.id);
    const pid = wine.product_id || '';
    const imgUrl = pid ? `https://bilder.vinmonopolet.no/cache/300x300-0/${pid}-1.jpg` : '';
    const vmUrl  = pid ? `https://www.vinmonopolet.no/p/${pid}` : null;

    // Build Vinmonopolet search URL using producer or wine name
    const searchTerm = (wine.producer || wine.name)
      .split('(')[0].split(',')[0].trim();
    const searchUrl = `https://www.vinmonopolet.no/search?q=${encodeURIComponent(searchTerm)}&searchType=product`;

    const row = document.createElement('div');
    row.className = 'wine-row' + (isDone ? ' done' : '');
    row.id = 'row-' + wine.id;

    row.innerHTML = `
      <img class="img-preview" id="img-${wine.id}"
           src="${imgUrl}" onerror="this.src=''"
           title="Nåværende bilde">

      <div class="wine-info">
        <div class="wine-name">
          ${wine.name}
          ${isDone ? '<span class="badge-done">✅ OK</span>' : ''}
        </div>
        <div class="wine-producer">${wine.producer || ''}</div>
        <div class="wine-meta">${wine.type} · ${wine.country}</div>
        <div class="current-id">
          Varenr: <strong id="pid-${wine.id}">${pid || '—'}</strong>
          ${vmUrl ? `<a href="${vmUrl}" target="_blank">↗ Se på Vinmonopolet</a>` : ''}
        </div>
      </div>

      <div class="actions">
        <a class="search-link" href="${searchUrl}" target="_blank">
          🔍 Søk «${searchTerm}» på Vinmonopolet
        </a>
        <div class="search-hint">Kopier varenummeret fra URL-en og lim inn under</div>
        <div class="input-row">
          <input class="id-input" id="new-pid-${wine.id}"
                 placeholder="Lim inn varenummer her..."
                 onkeydown="if(event.key==='Enter') save(${wine.id})">
          <button class="btn-save" id="btn-${wine.id}" onclick="save(${wine.id})">Lagre</button>
        </div>
        <div class="status" id="status-${wine.id}"></div>
      </div>
    `;

    list.appendChild(row);
  });
}

async function save(wineId) {
  const input = document.getElementById('new-pid-' + wineId);
  const newId = input.value.trim().replace(/\D/g, ''); // only digits
  if (!newId) {
    showStatus(wineId, 'Skriv inn et varenummer', 'err');
    return;
  }

  const btn = document.getElementById('btn-' + wineId);
  btn.disabled = true;
  btn.textContent = 'Lagrer...';

  try {
    const r = await fetch(BASE + '/api/update-product-id', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wineId, productId: newId }),
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'Ukjent feil');

    // Update UI
    updated.add(wineId);
    document.getElementById('pid-' + wineId).textContent = newId;
    document.getElementById('img-' + wineId).src =
      `https://bilder.vinmonopolet.no/cache/300x300-0/${newId}-1.jpg`;
    document.getElementById('row-' + wineId).className = 'wine-row done';
    input.value = '';
    showStatus(wineId, '✅ Lagret! Varenummer: ' + newId, 'ok');
    updateProgress();

  } catch(e) {
    showStatus(wineId, '❌ Feil: ' + e.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = 'Lagre';
}

function showStatus(wineId, msg, type) {
  const s = document.getElementById('status-' + wineId);
  s.textContent = msg;
  s.className = 'status ' + type;
  if (type === 'ok') setTimeout(() => s.textContent = '', 4000);
}

load();
</script>
</body>
</html>
